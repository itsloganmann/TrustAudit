name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: test
      WHATSAPP_PROVIDER: mock
      VISION_PROVIDER: mock
      JWT_SECRET: ci-test-secret-not-used-in-prod
      SUBMIT_CONFIDENCE_THRESHOLD: "0.85"
      BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install WeasyPrint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 \
            libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info \
            fonts-dejavu-core fonts-liberation

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest -q --maxfail=5 --disable-warnings

  frontend-build:
    name: frontend build + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present
        continue-on-error: true # lint warnings shouldn't break the build for now

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          retention-days: 7

  e2e-playwright:
    name: e2e playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-tests, frontend-build]
    env:
      APP_ENV: test
      WHATSAPP_PROVIDER: mock
      VISION_PROVIDER: mock
      JWT_SECRET: ci-test-secret-not-used-in-prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install WeasyPrint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 \
            libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info \
            fonts-dejavu-core fonts-liberation

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Install frontend deps + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install e2e deps
        if: hashFiles('e2e/package.json') != ''
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        if: hashFiles('e2e/package.json') != ''
        working-directory: e2e
        run: npx playwright test --reporter=line

      - name: Upload Playwright report
        if: always() && hashFiles('e2e/playwright-report') != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: e2e/playwright-report
          retention-days: 7
