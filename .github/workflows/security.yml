name: Security

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main
  schedule:
    # Weekly Monday 09:00 UTC sweep so dormant branches still get scanned.
    - cron: "0 9 * * 1"

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  bandit:
    name: bandit (python static analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - name: Bandit scan
        run: |
          bandit -r backend/app -ll -q -f txt -o bandit-report.txt || true
          cat bandit-report.txt
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ github.sha }}
          path: bandit-report.txt
          retention-days: 30

  pip-audit:
    name: pip-audit (python deps)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt --strict --disable-pip || true

  npm-audit:
    name: npm audit (frontend deps)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Frontend npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true
      - name: E2E npm audit
        if: hashFiles('e2e/package.json') != ''
        working-directory: e2e
        run: npm audit --audit-level=high || true

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
