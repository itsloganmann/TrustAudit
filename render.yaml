# Render.com Blueprint — Single Web Service
# Deploys FastAPI (Python) serving both API + built React frontend
services:
  - type: web
    name: trustaudit
    runtime: python
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt && python seed.py
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: NODE_VERSION
        value: "20"
    healthCheckPath: /health
